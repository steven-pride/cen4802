<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            background-color: #e9ecef;
            color: #495057;
            min-height: 1.5rem;
            word-wrap: break-word;
        }
        .error {
            color: #dc3545;
            background-color: #f8d7da;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fibonacci Calculator</h1>
        <div class="form-group">
            <label for="nValue">Enter the term number (n):</label>
            <input type="number" id="nValue" placeholder="e.g. 10" min="0">
        </div>
        <button onclick="calculateFibonacci()">Calculate</button>
        <div id="result">The result will appear here...</div>
    </div>

    <script>
        async function calculateFibonacci() {
            const n = document.getElementById('nValue').value;
            const resultDiv = document.getElementById('result');
            
            if (n === '') {
                resultDiv.innerText = 'Please enter a number.';
                resultDiv.className = 'error';
                return;
            }

            resultDiv.innerText = 'Calculating...';
            resultDiv.className = '';

            try {
                const response = await fetch(`/fibonacci?n=${n}`);
                const data = await response.text();
                resultDiv.innerText = data;
                if (data.startsWith('Invalid')) {
                    resultDiv.className = 'error';
                } else {
                    resultDiv.className = '';
                }
            } catch (error) {
                resultDiv.innerText = 'Error connecting to the service.';
                resultDiv.className = 'error';
                console.error('Error:', error);
            }
        }
        
        // Allow pressing Enter to trigger calculation
        document.getElementById('nValue').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                calculateFibonacci();
            }
        });
    </script>
</body>
</html>
